<!DOCTYPE html>
<html>
<body>
<canvas id="c" width="128" height="128"></canvas>
<script>
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#e1306c';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // Progress bar
  const barY = size * 0.6;
  const barH = Math.max(2, size * 0.08);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(size*0.1, barY, size*0.8, barH, barH/2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.roundRect(size*0.1, barY, size*0.5, barH, barH/2);
  ctx.fill();

  // Circle thumb
  const thumbR = Math.max(3, size * 0.09);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(size*0.6, barY + barH/2, thumbR, 0, Math.PI*2);
  ctx.fill();

  // Play triangle
  ctx.fillStyle = '#fff';
  const cx = size * 0.5, cy = size * 0.38, r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(cx - r*0.7, cy - r);
  ctx.lineTo(cx - r*0.7, cy + r);
  ctx.lineTo(cx + r, cy);
  ctx.closePath();
  ctx.fill();

  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = `icon${size}.png`;
  link.textContent = `Download icon${size}.png`;
  link.style.display = 'block';
  document.body.appendChild(link);
  link.click();
});
</script>
</body>
</html>
