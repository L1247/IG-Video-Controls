<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 200px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      padding: 0;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 16px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header .subtitle {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.85);
      margin-top: 4px;
    }

    .content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #checkBtn {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    #checkBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    #checkBtn:active {
      transform: translateY(0);
    }

    #checkBtn:disabled {
      background: #444;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      line-height: 1.5;
    }

    /* Summary cards row */
    .summary-row {
      display: none;
      gap: 10px;
      width: 100%;
    }

    .summary-row.visible {
      display: flex;
    }

    .summary-card {
      flex: 1;
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      backdrop-filter: blur(10px);
      animation: fadeInUp 0.4s ease;
    }

    .summary-card.kept {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.35);
    }

    .summary-card.closed {
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.35);
    }


    .summary-card .card-icon {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .summary-card .card-number {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }

    .summary-card.kept .card-number { color: #66bb6a; }
    .summary-card.closed .card-number { color: #ef5350; }

    .summary-card .card-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 2px;
    }

    /* Tab detail list */
    .tab-list {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .tab-list.visible {
      display: flex;
    }

    .tab-list::-webkit-scrollbar {
      width: 4px;
    }

    .tab-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 12px;
      animation: fadeInUp 0.35s ease;
    }

    .tab-item .tab-status {
      font-size: 16px;
      flex-shrink: 0;
    }

    .tab-item .tab-info {
      flex: 1;
      min-width: 0;
    }

    .tab-item .tab-title {
      font-weight: 600;
      font-size: 12px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-item .tab-detail {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      margin-top: 1px;
    }

    .spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner.visible {
      display: block;
    }

    #progressText {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      display: none;
      text-align: center;
    }

    #progressText.visible {
      display: block;
    }

    .error-msg {
      width: 100%;
      padding: 12px;
      background: rgba(244, 67, 54, 0.1);
      border: 1px solid rgba(244, 67, 54, 0.3);
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      color: #ef9a9a;
      display: none;
      animation: fadeInUp 0.4s ease;
    }

    .error-msg.visible {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📷 IG Story Checker</h1>
    <div class="subtitle">自動關閉無限時動態的 IG 分頁</div>
  </div>

  <div class="content">
    <button id="checkBtn">🔍 檢查並清理分頁</button>
    <div class="hint">掃描所有 IG 分頁，保留有限動態的、關閉沒有的</div>
    <div class="spinner" id="spinner"></div>
    <div id="progressText"></div>

    <div class="summary-row" id="summaryRow">
      <div class="summary-card kept">
        <div class="card-icon">✅</div>
        <div class="card-number" id="keptCount">0</div>
        <div class="card-label">保留分頁</div>
      </div>
      <div class="summary-card closed">
        <div class="card-icon">🗑️</div>
        <div class="card-number" id="closedCount">0</div>
        <div class="card-label">已關閉分頁</div>
      </div>
    </div>

    <div class="tab-list" id="tabList"></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="footer">IG Story Checker v1.2</div>

  <script src="popup.js"></script>
</body>
</html>
